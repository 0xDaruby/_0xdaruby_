    <style>
      /* Minimal, instant-loading skeleton styles (shows before app CSS loads) */
      html, body { background: #0b1020; }
      .splash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; }
      .splash-inner { width: min(900px, 92%); display: flex; gap: 1rem; align-items: center; color: #fff; }
      .skeleton-avatar { width: 64px; height: 64px; border-radius: 12px; background: linear-gradient(90deg,#111827,#374151,#111827); background-size: 200% 100%; animation: pulse 1.3s linear infinite; }
      .skeleton-lines { display:flex; flex-direction:column; gap:8px; }
      .skeleton-line { height: 14px; border-radius: 8px; background: linear-gradient(90deg,#111827,#374151,#111827); background-size: 200% 100%; animation: pulse 1.3s linear infinite; }
      .skeleton-line.short { width: 160px; }
      .skeleton-line.long { width: 340px; }
      @keyframes pulse { 0% { background-position: 0% 0%; } 100% { background-position: 100% 0%; } }
      .splash.fade-out { opacity: 0; transition: opacity .4s ease; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="splash" class="splash" aria-hidden="true">
      <div class="splash-inner">
        <div class="skeleton-avatar"></div>
        <div class="skeleton-lines">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line long"></div>
        </div>
      </div>
    </div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if (
        localStorage.theme === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }

      localStorage.theme = "light";
      localStorage.theme = "dark";
      localStorage.removeItem("theme");
    </script>
  </body>
